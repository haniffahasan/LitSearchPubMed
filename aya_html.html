<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AYA Oncology Literature Mapper</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f8faf8; font-family: Georgia, 'Times New Roman', serif; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #d4e8d4; border-radius: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fi { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .pr:hover { background: #e8f5e9 !important; }
    .ct-btn { background: none; border: 1px solid #d4e8d4; color: #4a6b4a; padding: 4px 11px; border-radius: 20px; cursor: pointer; font-family: monospace; font-size: 10px; transition: all 0.12s; }
    .ct-btn:hover { border-color: #43a047; color: #2d7d32; background: #e8f5e9; }
    .ct-btn.active { background: #2d7d32; border-color: #2d7d32; color: #fff; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = Recharts;

    const EUTILS = "https://eutils.ncbi.nlm.nih.gov/entrez/eutils";
    const MAX_PMIDS = 500;
    const PAGE_SIZE = 15;

    const DEFAULT_QUERY = `("adolescent and young adult"[tiab] OR "AYA"[tiab] OR "adolescents"[tiab] OR "young adults"[tiab]) AND ("cancer"[tiab] OR "neoplasm"[tiab] OR "tumor"[tiab] OR "tumour"[tiab] OR "malignancy"[tiab] OR "leukemia"[tiab] OR "lymphoma"[tiab] OR "carcinoma"[tiab] OR "sarcoma"[tiab] OR "oncology"[tiab]) AND ("East Asia"[tiab] OR "Southeast Asia"[tiab] OR "Singapore"[tiab] OR "China"[tiab] OR "Japan"[tiab] OR "Korea"[tiab] OR "Taiwan"[tiab] OR "Hong Kong"[tiab] OR "Thailand"[tiab] OR "Malaysia"[tiab] OR "Indonesia"[tiab] OR "Vietnam"[tiab] OR "Philippines"[tiab] OR "Myanmar"[tiab])`;

    const CANCER_TYPES = [
      { label: "Leukemia",    terms: ["leukemia", "leukaemia", "lymphoblastic", "myeloid", "aml", "all "] },
      { label: "Lymphoma",    terms: ["lymphoma", "hodgkin"] },
      { label: "Brain / CNS", terms: ["brain", "glioma", "glioblastoma", "medulloblastoma", "astrocytoma"] },
      { label: "Sarcoma",     terms: ["sarcoma", "osteosarcoma", "ewing"] },
      { label: "Thyroid",     terms: ["thyroid"] },
      { label: "Colorectal",  terms: ["colorectal", "colon cancer", "rectal cancer"] },
      { label: "Breast",      terms: ["breast"] },
      { label: "Germ Cell",   terms: ["germ cell", "testicular", "seminoma"] },
      { label: "Cervical",    terms: ["cervical", "cervix"] },
      { label: "Liver",       terms: ["hepatocellular", "liver cancer"] },
    ];

    const COUNTRY_TERMS = {
      "China":       ["china", "chinese"],
      "Japan":       ["japan", "japanese"],
      "Korea":       ["korea", "korean"],
      "Taiwan":      ["taiwan"],
      "Singapore":   ["singapore"],
      "Hong Kong":   ["hong kong"],
      "Thailand":    ["thailand", "thai"],
      "Malaysia":    ["malaysia", "malaysian"],
      "Indonesia":   ["indonesia", "indonesian"],
      "Vietnam":     ["vietnam", "viet nam", "vietnamese"],
      "Philippines": ["philippines", "philippine", "filipino"],
      "Myanmar":     ["myanmar", "burma"],
    };

    const C = {
      bg: "#f8faf8", surface: "#ffffff", border: "#d4e8d4", accent: "#2d7d32",
      accentLt: "#43a047", accentPl: "#e8f5e9", accentBar: "#66bb6a", accentHi: "#2d7d32",
      text: "#1a2e1a", textMid: "#4a6b4a", textDim: "#7a9b7a", textFaint: "#b0ccb0",
      header: "#1b5e20", headerBg: "#f1f8f1", red: "#c62828",
    };

    function Spinner() {
      return (
        <svg width="13" height="13" viewBox="0 0 24 24" style={{ animation: "spin 1s linear infinite", display: "inline-block", verticalAlign: "middle" }}>
          <circle cx="12" cy="12" r="10" stroke={C.accent} strokeWidth="3" fill="none" strokeDasharray="31.4" strokeDashoffset="10" />
        </svg>
      );
    }

    const Tip = ({ active, payload, label }) => {
      if (!active || !payload?.length) return null;
      return (
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, padding: "7px 13px", borderRadius: 4, boxShadow: "0 2px 8px rgba(0,0,0,0.08)" }}>
          <div style={{ color: C.textDim, fontSize: 10, fontFamily: "monospace", marginBottom: 2 }}>{label}</div>
          <div style={{ color: C.text, fontSize: 13, fontWeight: 600 }}>{payload[0].value} papers</div>
        </div>
      );
    };

    const CountryTip = ({ active, payload }) => {
      if (!active || !payload?.length) return null;
      return (
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, padding: "7px 13px", borderRadius: 4, boxShadow: "0 2px 8px rgba(0,0,0,0.08)" }}>
          <div style={{ color: C.textDim, fontSize: 10, fontFamily: "monospace", marginBottom: 2 }}>{payload[0].payload.country}</div>
          <div style={{ color: C.text, fontSize: 13, fontWeight: 600 }}>{payload[0].value} papers</div>
        </div>
      );
    };

    function App() {
      const [query, setQuery] = useState(DEFAULT_QUERY);
      const [editing, setEditing] = useState(false);
      const [papers, setPapers] = useState([]);
      const [chart, setChart] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [total, setTotal] = useState(null);
      const [status, setStatus] = useState("");
      const [page, setPage] = useState(0);
      const [sortF, setSortF] = useState("year");
      const [sortD, setSortD] = useState("desc");
      const [yrFilter, setYrFilter] = useState("");
      const [hovered, setHovered] = useState(null);
      const [expandedPmid, setExpandedPmid] = useState(null);
      const [abstracts, setAbstracts] = useState({});
      const [abstractLoading, setAbstractLoading] = useState({});
      const [cancerFilter, setCancerFilter] = useState("");
      const [countryData, setCountryData] = useState([]);
      const [hoveredCountry, setHoveredCountry] = useState(null);

      const sleep = ms => new Promise(r => setTimeout(r, ms));

      async function fetchAbstract(pmid) {
        if (abstracts[pmid] !== undefined) return;
        setAbstractLoading(prev => ({ ...prev, [pmid]: true }));
        try {
          const r = await fetch(`${EUTILS}/efetch.fcgi?db=pubmed&id=${pmid}&rettype=abstract&retmode=xml`);
          const txt = await r.text();
          const parser = new DOMParser();
          const xml = parser.parseFromString(txt, "text/xml");
          const nodes = [...xml.querySelectorAll("AbstractText")];
          const abs = nodes.length === 0
            ? "No abstract available."
            : nodes.map(el => {
                const label = el.getAttribute("Label");
                return (label ? `${label}:\n` : "") + el.textContent.trim();
              }).join("\n\n");
          setAbstracts(prev => ({ ...prev, [pmid]: abs }));
        } catch {
          setAbstracts(prev => ({ ...prev, [pmid]: "Failed to load abstract." }));
        }
        setAbstractLoading(prev => ({ ...prev, [pmid]: false }));
      }

      function toggleExpand(pmid) {
        if (expandedPmid === pmid) { setExpandedPmid(null); return; }
        setExpandedPmid(pmid);
        fetchAbstract(pmid);
      }

      function computeCountryData(all) {
        return Object.entries(COUNTRY_TERMS)
          .map(([country, terms]) => ({
            country,
            n: all.filter(p => terms.some(t => p.title.toLowerCase().includes(t))).length,
          }))
          .filter(d => d.n > 0)
          .sort((a, b) => b.n - a.n);
      }

      async function runSearch() {
        setLoading(true); setError(null); setPapers([]); setChart([]); setPage(0); setTotal(null);
        setCountryData([]); setCancerFilter(""); setExpandedPmid(null); setAbstracts({});
        try {
          setStatus("Querying PubMed...");
          const r = await fetch(`${EUTILS}/esearch.fcgi?db=pubmed&term=${encodeURIComponent(query)}&retmax=${MAX_PMIDS}&retmode=json&sort=pub+date`);
          if (!r.ok) throw new Error(`Search failed (${r.status})`);
          const d = await r.json();
          const tot = parseInt(d.esearchresult.count, 10);
          const pmids = d.esearchresult.idlist || [];
          setTotal(tot);
          if (!pmids.length) { setStatus("No results."); setLoading(false); return; }

          const all = [];
          for (let i = 0; i < pmids.length; i += 200) {
            const batch = pmids.slice(i, i + 200);
            setStatus(`Fetching metadata (${Math.min(i + 200, pmids.length)}/${pmids.length})...`);
            const sr = await fetch(`${EUTILS}/esummary.fcgi?db=pubmed&id=${batch.join(",")}&retmode=json`);
            if (!sr.ok) throw new Error("esummary failed");
            const sd = await sr.json();
            for (const uid of batch) {
              const doc = sd.result?.[uid];
              if (!doc || doc.error) continue;
              const raw = doc.pubdate || doc.epubdate || "";
              const ym = raw.match(/^(\d{4})/);
              const yr = ym ? parseInt(ym[1], 10) : null;
              const auths = doc.authors || [];
              const aStr = !auths.length ? "Unknown" : auths.length === 1 ? auths[0].name : `${auths[0].name} et al.`;
              all.push({ pmid: uid, title: (doc.title || "No title").replace(/\.$/, ""), aStr, journal: doc.source || "—", yr, raw });
            }
            if (i + 200 < pmids.length) await sleep(380);
          }

          const yc = {};
          const now = new Date().getFullYear();
          for (const p of all) if (p.yr && p.yr >= 1995 && p.yr <= now) yc[p.yr] = (yc[p.yr] || 0) + 1;
          const yrs = Object.keys(yc).map(Number).sort((a, b) => a - b);
          if (yrs.length) {
            const cd = [];
            for (let y = yrs[0]; y <= yrs[yrs.length - 1]; y++) cd.push({ y, n: yc[y] || 0 });
            setChart(cd);
          }

          setPapers(all);
          setCountryData(computeCountryData(all));
          setStatus(tot > MAX_PMIDS
            ? `Showing ${all.length} most recent of ${tot.toLocaleString()} total. Export CSV for full list.`
            : `${all.length} papers retrieved.`);
        } catch (e) { setError(e.message); setStatus(""); }
        finally { setLoading(false); }
      }

      function exportCSV() {
        const hdr = ["PMID", "Title", "Authors", "Journal", "Year", "PubDate", "Link"];
        const rows = filtered().map(p => [p.pmid, `"${p.title.replace(/"/g, '""')}"`, `"${p.aStr}"`, `"${p.journal.replace(/"/g, '""')}"`, p.yr ?? "", p.raw, `https://pubmed.ncbi.nlm.nih.gov/${p.pmid}/`]);
        const csv = [hdr, ...rows].map(r => r.join(",")).join("\n");
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
        a.download = "aya_oncology_asia.csv";
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      }

      function toggleSort(f) {
        if (sortF === f) setSortD(d => d === "asc" ? "desc" : "asc");
        else { setSortF(f); setSortD("desc"); }
        setPage(0);
      }

      function filtered() {
        let l = [...papers];
        if (yrFilter) l = l.filter(p => String(p.yr) === yrFilter);
        if (cancerFilter) {
          const ct = CANCER_TYPES.find(c => c.label === cancerFilter);
          if (ct) l = l.filter(p => ct.terms.some(t => p.title.toLowerCase().includes(t)));
        }
        l.sort((a, b) => {
          const va = sortF === "year" ? (a.yr || 0) : String(a[sortF === "title" ? "title" : sortF === "journal" ? "journal" : "aStr"] || "").toLowerCase();
          const vb = sortF === "year" ? (b.yr || 0) : String(b[sortF === "title" ? "title" : sortF === "journal" ? "journal" : "aStr"] || "").toLowerCase();
          return va < vb ? (sortD === "asc" ? -1 : 1) : va > vb ? (sortD === "asc" ? 1 : -1) : 0;
        });
        return l;
      }

      const sorted = filtered();
      const pages = Math.ceil(sorted.length / PAGE_SIZE);
      const paged = sorted.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
      const uYrs = [...new Set(papers.map(p => p.yr).filter(Boolean))].sort((a, b) => b - a);
      const maxN  = chart.length ? Math.max(...chart.map(d => d.n)) : 1;
      const maxCN = countryData.length ? Math.max(...countryData.map(d => d.n)) : 1;

      const SI = ({ f }) => sortF !== f
        ? <span style={{ color: C.textFaint, marginLeft: 3 }}>↕</span>
        : <span style={{ color: C.accent, marginLeft: 3 }}>{sortD === "asc" ? "↑" : "↓"}</span>;

      const ColHdr = ({ f, label, pl = 8 }) => (
        <button onClick={() => toggleSort(f)} style={{ background: "none", border: "none", cursor: "pointer", textAlign: "left", padding: 0, paddingLeft: pl }}>
          <span style={{ fontSize: 9.5, fontFamily: "monospace", letterSpacing: "0.12em", textTransform: "uppercase", color: sortF === f ? C.accent : C.textDim }}>{label}</span>
          <SI f={f} />
        </button>
      );

      const card = { background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: "16px 18px", marginBottom: 20, boxShadow: "0 1px 4px rgba(0,0,0,0.05)" };
      const sectionLabel = { fontSize: 9.5, letterSpacing: "0.13em", color: C.textDim, textTransform: "uppercase", fontFamily: "monospace", marginBottom: 12 };

      return (
        <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: "Georgia, 'Times New Roman', serif" }}>

          {/* Header */}
          <div style={{ borderBottom: `2px solid ${C.border}`, padding: "16px 28px", background: C.headerBg, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 9.5, letterSpacing: "0.17em", color: C.textDim, textTransform: "uppercase", fontFamily: "monospace", marginBottom: 4 }}>National Cancer Centre Singapore · Epidemiology</div>
              <div style={{ fontSize: 20, color: C.header }}>AYA Oncology Literature Mapper</div>
              <div style={{ fontSize: 10.5, color: C.textDim, fontFamily: "monospace", marginTop: 2 }}>East &amp; Southeast Asia · PubMed Index</div>
            </div>
            {papers.length > 0 && !loading && (
              <button onClick={exportCSV} style={{ background: C.accent, border: "none", color: "#fff", padding: "7px 16px", borderRadius: 4, cursor: "pointer", fontSize: 10.5, fontFamily: "monospace", boxShadow: "0 1px 4px rgba(45,125,50,0.3)" }}>
                ↓ Export CSV ({sorted.length})
              </button>
            )}
          </div>

          <div style={{ padding: "24px 28px", maxWidth: 1060, margin: "0 auto" }}>

            {/* Search box */}
            <div style={card}>
              <div style={sectionLabel}>PubMed Search String</div>
              {editing
                ? <textarea value={query} onChange={e => setQuery(e.target.value)} rows={5}
                    style={{ width: "100%", background: C.bg, border: `1px solid ${C.border}`, color: C.textMid, fontFamily: "monospace", fontSize: 11, padding: "9px 11px", borderRadius: 4, resize: "vertical", lineHeight: 1.65, outline: "none" }} />
                : <div onClick={() => setEditing(true)}
                    style={{ fontFamily: "monospace", fontSize: 11, color: C.textMid, lineHeight: 1.7, cursor: "text", padding: "9px 11px", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 4, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{query}</div>
              }
              <div style={{ display: "flex", gap: 8, marginTop: 12, alignItems: "center" }}>
                <button onClick={runSearch} disabled={loading || !query.trim()}
                  style={{ background: loading ? C.textFaint : C.accent, border: "none", color: "#fff", padding: "7px 20px", borderRadius: 4, cursor: loading ? "not-allowed" : "pointer", fontSize: 10.5, fontFamily: "monospace", display: "flex", alignItems: "center", gap: 6 }}>
                  {loading && <Spinner />}{loading ? "Searching..." : "Run Search"}
                </button>
                <button onClick={() => setEditing(!editing)}
                  style={{ background: "none", border: `1px solid ${C.border}`, color: C.textMid, padding: "7px 13px", borderRadius: 4, cursor: "pointer", fontSize: 10.5, fontFamily: "monospace" }}>
                  {editing ? "Lock" : "Edit Query"}
                </button>
                {editing && <button onClick={() => setQuery(DEFAULT_QUERY)} style={{ background: "none", border: "none", color: C.textDim, cursor: "pointer", fontSize: 10.5, fontFamily: "monospace" }}>Reset</button>}
              </div>
            </div>

            {/* Status */}
            {(status || error) && (
              <div style={{ fontFamily: "monospace", fontSize: 11, color: error ? C.red : C.textMid, marginBottom: 16, display: "flex", alignItems: "center", gap: 6 }}>
                {loading && <Spinner />}{error ? `Error: ${error}` : status}
              </div>
            )}

            {/* Stats */}
            {total !== null && !loading && (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10, marginBottom: 22, animation: "fi 0.4s ease" }}>
                {[["Total in PubMed", total.toLocaleString()], ["Retrieved & mapped", papers.length.toLocaleString()], ["Year span", chart.length ? `${chart[0].y} – ${chart[chart.length - 1].y}` : "—"]].map(([l, v]) => (
                  <div key={l} style={{ ...card, marginBottom: 0, borderLeft: `3px solid ${C.accent}` }}>
                    <div style={{ fontSize: 9, fontFamily: "monospace", letterSpacing: "0.11em", color: C.textDim, textTransform: "uppercase", marginBottom: 6 }}>{l}</div>
                    <div style={{ fontSize: 22, color: C.accent }}>{v}</div>
                  </div>
                ))}
              </div>
            )}

            {/* Publication timeline */}
            {chart.length > 0 && (
              <div style={{ ...card, animation: "fi 0.5s ease" }}>
                <div style={sectionLabel}>Publication Timeline — Papers per Year</div>
                <ResponsiveContainer width="100%" height={190}>
                  <BarChart data={chart} margin={{ top: 3, right: 6, left: -20, bottom: 0 }}>
                    <CartesianGrid vertical={false} stroke={C.border} strokeDasharray="3 3" />
                    <XAxis dataKey="y" tick={{ fill: C.textDim, fontSize: 10, fontFamily: "monospace" }} axisLine={false} tickLine={false} interval="preserveStartEnd" />
                    <YAxis tick={{ fill: C.textDim, fontSize: 10, fontFamily: "monospace" }} axisLine={false} tickLine={false} />
                    <Tooltip content={<Tip />} cursor={{ fill: C.accentPl }} />
                    <Bar dataKey="n" radius={[3, 3, 0, 0]} onMouseEnter={(_, i) => setHovered(i)} onMouseLeave={() => setHovered(null)}>
                      {chart.map((_, i) => <Cell key={i} fill={hovered === i ? C.accentHi : chart[i].n >= maxN * 0.65 ? C.accentLt : C.accentBar} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            )}

            {/* Country breakdown */}
            {countryData.length > 0 && (
              <div style={{ ...card, animation: "fi 0.55s ease" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 14 }}>
                  <div style={sectionLabel}>Country Breakdown — Title Mentions</div>
                  <div style={{ fontSize: 9, color: C.textFaint, fontFamily: "monospace" }}>title-keyword proxy · may undercount</div>
                </div>
                <ResponsiveContainer width="100%" height={Math.max(180, countryData.length * 28)}>
                  <BarChart data={countryData} layout="vertical" margin={{ top: 0, right: 30, left: 10, bottom: 0 }}>
                    <CartesianGrid horizontal={false} stroke={C.border} strokeDasharray="3 3" />
                    <XAxis type="number" tick={{ fill: C.textDim, fontSize: 10, fontFamily: "monospace" }} axisLine={false} tickLine={false} />
                    <YAxis type="category" dataKey="country" tick={{ fill: C.textMid, fontSize: 10, fontFamily: "monospace" }} axisLine={false} tickLine={false} width={75} />
                    <Tooltip content={<CountryTip />} cursor={{ fill: C.accentPl }} />
                    <Bar dataKey="n" radius={[0, 3, 3, 0]} onMouseEnter={(_, i) => setHoveredCountry(i)} onMouseLeave={() => setHoveredCountry(null)}>
                      {countryData.map((_, i) => <Cell key={i} fill={hoveredCountry === i ? C.accentHi : countryData[i].n >= maxCN * 0.65 ? C.accentLt : C.accentBar} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            )}

            {/* Cancer filter + papers */}
            {papers.length > 0 && (
              <div style={{ animation: "fi 0.6s ease" }}>
                <div style={card}>
                  <div style={sectionLabel}>Filter by Cancer Type</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    <button className={`ct-btn${cancerFilter === "" ? " active" : ""}`} onClick={() => { setCancerFilter(""); setPage(0); }}>All</button>
                    {CANCER_TYPES.map(ct => (
                      <button key={ct.label} className={`ct-btn${cancerFilter === ct.label ? " active" : ""}`} onClick={() => { setCancerFilter(ct.label); setPage(0); }}>
                        {ct.label}
                      </button>
                    ))}
                  </div>
                </div>

                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 11 }}>
                  <div style={{ fontSize: 9.5, letterSpacing: "0.13em", color: C.textDim, textTransform: "uppercase", fontFamily: "monospace" }}>
                    Papers — {sorted.length}{yrFilter ? ` · ${yrFilter}` : ""}{cancerFilter ? ` · ${cancerFilter}` : ""}
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                    <span style={{ fontSize: 10, fontFamily: "monospace", color: C.textDim }}>Year:</span>
                    <select value={yrFilter} onChange={e => { setYrFilter(e.target.value); setPage(0); }}
                      style={{ background: C.surface, border: `1px solid ${C.border}`, color: C.textMid, fontFamily: "monospace", fontSize: 10.5, padding: "3px 7px", borderRadius: 4, outline: "none" }}>
                      <option value="">All</option>
                      {uYrs.map(y => <option key={y} value={y}>{y}</option>)}
                    </select>
                  </div>
                </div>

                <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.05)" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "50px 1fr 125px 85px", background: C.accentPl, padding: "8px 12px", borderBottom: `1px solid ${C.border}` }}>
                    <ColHdr f="year" label="Year" pl={0} />
                    <ColHdr f="title" label="Title · Authors" />
                    <ColHdr f="journal" label="Journal" />
                    <ColHdr f="pmid" label="PMID" />
                  </div>

                  {paged.map((p, idx) => (
                    <div key={p.pmid}>
                      <div className="pr" onClick={() => toggleExpand(p.pmid)}
                        style={{ display: "grid", gridTemplateColumns: "50px 1fr 125px 85px", borderBottom: expandedPmid === p.pmid ? `1px solid ${C.accentBar}` : idx < paged.length - 1 ? `1px solid ${C.border}` : "none", padding: "10px 12px", transition: "background 0.12s", cursor: "pointer", background: expandedPmid === p.pmid ? C.accentPl : "transparent" }}>
                        <div style={{ fontFamily: "monospace", fontSize: 12, color: C.accent, paddingTop: 1 }}>{p.yr ?? "—"}</div>
                        <div style={{ padding: "0 11px 0 8px" }}>
                          <div style={{ color: C.accent, fontSize: 12, lineHeight: 1.5, marginBottom: 3 }}>{p.title}</div>
                          <div style={{ fontFamily: "monospace", fontSize: 10, color: C.textDim }}>{p.aStr}</div>
                        </div>
                        <div style={{ fontFamily: "monospace", fontSize: 10, color: C.textDim, padding: "0 8px", lineHeight: 1.5, paddingTop: 1 }}>{p.journal}</div>
                        <div style={{ paddingTop: 1, display: "flex", flexDirection: "column", gap: 5 }}>
                          <a href={`https://pubmed.ncbi.nlm.nih.gov/${p.pmid}/`} target="_blank" rel="noopener noreferrer"
                            onClick={e => e.stopPropagation()}
                            style={{ fontFamily: "monospace", fontSize: 10, color: C.textDim, textDecoration: "none" }}
                            onMouseEnter={e => (e.target.style.color = C.accent)} onMouseLeave={e => (e.target.style.color = C.textDim)}>
                            {p.pmid} ↗
                          </a>
                          <span style={{ fontFamily: "monospace", fontSize: 9, color: expandedPmid === p.pmid ? C.accent : C.textFaint }}>
                            {expandedPmid === p.pmid ? "▲ hide" : "▼ abstract"}
                          </span>
                        </div>
                      </div>

                      {expandedPmid === p.pmid && (
                        <div style={{ background: "#f1f8f1", borderBottom: `1px solid ${C.border}`, padding: "13px 16px 14px 70px", animation: "fi 0.2s ease" }}>
                          {abstractLoading[p.pmid]
                            ? <div style={{ fontFamily: "monospace", fontSize: 11, color: C.textDim, display: "flex", alignItems: "center", gap: 6 }}><Spinner /> Loading abstract...</div>
                            : <div style={{ fontFamily: "Georgia, serif", fontSize: 11.5, color: C.textMid, lineHeight: 1.85, whiteSpace: "pre-wrap" }}>{abstracts[p.pmid]}</div>
                          }
                        </div>
                      )}
                    </div>
                  ))}
                </div>

                {pages > 1 && (
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 16 }}>
                    <button onClick={() => setPage(p => Math.max(0, p - 1))} disabled={page === 0}
                      style={{ background: "none", border: `1px solid ${C.border}`, color: page === 0 ? C.textFaint : C.accent, fontFamily: "monospace", fontSize: 10.5, padding: "5px 14px", borderRadius: 4, cursor: page === 0 ? "not-allowed" : "pointer" }}>← Prev</button>
                    <span style={{ fontFamily: "monospace", fontSize: 10.5, color: C.textDim }}>{page + 1} / {pages} · {sorted.length} papers</span>
                    <button onClick={() => setPage(p => Math.min(pages - 1, p + 1))} disabled={page === pages - 1}
                      style={{ background: "none", border: `1px solid ${C.border}`, color: page === pages - 1 ? C.textFaint : C.accent, fontFamily: "monospace", fontSize: 10.5, padding: "5px 14px", borderRadius: 4, cursor: page === pages - 1 ? "not-allowed" : "pointer" }}>Next →</button>
                  </div>
                )}
              </div>
            )}

            {!loading && !papers.length && total === null && (
              <div style={{ textAlign: "center", padding: "60px 0", color: C.textFaint, fontFamily: "monospace", fontSize: 12 }}>Run a search to populate the literature map.</div>
            )}
            <div style={{ height: 36 }} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
